<!DOCTYPE html>
<html>
<head>
    <title>Add Supplier</title>
</head>
<body>

<h1>Add Supplier</h1>

<form method="POST">

    <p>Name</p>
    <input type="text" name="name" required>

    <p>Phone</p>
    <input type="text" name="phone">

    <p>Address</p>
    <textarea name="address"></textarea>

    <br><br>

    <button type="submit">
        Add Supplier
    </button>

</form>

<br>

<a href="/suppliers">Back to Suppliers</a>

</body>
</html>
